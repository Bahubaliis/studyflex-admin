<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlex Admin</title>
    <style>
        body { font-family: sans-serif; padding: 16px; background: #F5F3FF; }
        h2 { color: #6B48F2; margin-bottom: 8px; }
        select, input, button { padding: 8px; margin: 4px 0; width: 100%; box-sizing: border-box; }
        .section { background: white; padding: 16px; margin-bottom: 16px; border-radius: 12px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #eee; }
        .btn-del { background: #F44336; color: white; border: none; padding: 4px 12px; border-radius: 4px; width: auto; }
        .btn-save { background: #6B48F2; color: white; border: none; padding: 8px; border-radius: 4px; }
        .btn-danger { background: #D32F2F; color: white; border: none; padding: 8px; border-radius: 4px; margin-top: 4px; }
        .btn-refresh { background: #4CAF50; color: white; border: none; padding: 8px; border-radius: 4px; margin-top: 4px; }
        .count { font-size: 12px; color: #888; }
        #login-card { max-width: 400px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        #admin-panel { display: none; }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="login-card">
        <h2>Admin Login</h2>
        <input type="email" id="loginEmail" placeholder="Admin Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn-save" onclick="adminLogin()">Login</button>
        <p id="loginError" style="color:red;"></p>
    </div>

    <!-- Admin Panel (hidden by default) -->
    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>📚 StudyFlex Admin</h2>
            <button class="btn-del" onclick="adminLogout()">Logout</button>
        </div>

        <label>Stream:</label>
        <select id="streamSelect" onchange="onStreamChange()">
            <option value="">-- Select Stream --</option>
            <option value="CBSE">📚 CBSE / UP Board</option>
            <option value="JEE">🚀 JEE</option>
            <option value="NEET">💉 NEET</option>
        </select>

        <label>Chapter:</label>
        <select id="chapterSelect" onchange="document.getElementById('currentChapterId').value=this.value; loadAll();">
            <option value="">-- Select Chapter --</option>
        </select>

        <div style="margin-top:8px; display:flex; gap:8px;">
            <input type="text" id="currentChapterId" placeholder="Chapter ID will appear here" readonly style="flex:1;">
            <button onclick="copyChapterId()" style="width:auto; background:#6B48F2; color:white; border:none; padding:8px 16px; border-radius:4px;">📋 Copy</button>
        </div>

        <input type="hidden" id="editingChapterKey">

        <!-- Resources Section -->
        <div class="section" id="resourcesSection">
            <h3>📁 Resources <span id="resCount" class="count"></span></h3>
            <button class="btn-refresh" onclick="loadResources()">Refresh List</button>
            <div id="resourcesList">Loading...</div>
            <button class="btn-danger" onclick="deleteAllResources()">Delete All Resources</button>
            <h4>Add / Update Resource</h4>
            <input type="text" id="resTitle" placeholder="Title">
            <input type="text" id="resUrl" placeholder="URL (PDF/Video/Audio)">
            <select id="resType"><option>PDF</option><option>Video</option><option>Audio</option></select>
            <button class="btn-save" onclick="addResource()">Add Resource</button>
        </div>

        <!-- Quiz Section -->
        <div class="section" id="quizSection">
            <h3>❓ Quiz Questions <span id="quizCount" class="count"></span></h3>
            <button class="btn-refresh" onclick="loadQuizzes()">Refresh List</button>
            <div id="quizList">Loading...</div>
            <button class="btn-danger" onclick="deleteAllQuizzes()">Delete All Questions</button>
            <h4>Add / Update Question</h4>
            <input type="text" id="qQuestion" placeholder="Question text">
            <input type="text" id="qOptions" placeholder="Options (comma separated)">
            <input type="number" id="qCorrect" placeholder="Correct index (0-based)">
            <button class="btn-save" onclick="addQuestion()">Add Question</button>
        </div>

        <!-- Flashcards Section -->
        <div class="section" id="flashcardSection">
            <h3>🃏 Flashcards <span id="flashcardCount" class="count"></span></h3>
            <button class="btn-refresh" onclick="loadFlashcards()">Refresh List</button>
            <div id="flashcardList">Loading...</div>
            <button class="btn-danger" onclick="deleteAllFlashcards()">Delete All</button>
            <h4>Add / Update Flashcard</h4>
            <input type="text" id="fcQuestion" placeholder="Question">
            <input type="text" id="fcAnswer" placeholder="Answer">
            <button class="btn-save" onclick="addFlashcard()">Add Flashcard</button>
        </div>

        <!-- Chapter Management -->
        <div class="section">
            <h3>📚 Manage Chapters</h3>
            <button class="btn-refresh" onclick="loadChapters()">Refresh Chapter List</button>
            <div id="chapterList" style="max-height:200px; overflow-y:auto; margin:8px 0;"></div>
            <h4>Add / Update Chapter</h4>
            <input type="text" id="chapterName" placeholder="Chapter Name">
            <select id="chapterStream" onchange="onChapterStreamChange()">
                <option value="">-- Stream --</option>
                <option value="CBSE">CBSE</option>
                <option value="JEE">JEE</option>
                <option value="NEET">NEET</option>
            </select>
            <select id="chapterClass">
                <option value="">-- Class --</option>
            </select>
            <input type="text" id="chapterSubjectInput" placeholder="Subject (e.g. Computer Science)">
            <input type="hidden" id="editingChapterKey2">
            <button class="btn-save" onclick="saveChapter()">Save Chapter</button>
        </div>
    </div>

        // ================== STREAM CHANGE ==================
        function onStreamChange() {
            const stream = document.getElementById('streamSelect').value;
            const chapterSelect = document.getElementById('chapterSelect');
            chapterSelect.innerHTML = '<option value="">-- Select Chapter --</option>';
            document.getElementById('currentChapterId').value = '';
            if (!stream || !streamChapters[stream]) return;
            streamChapters[stream].forEach(ch => {
                const opt = document.createElement('option');
                opt.value = ch.id;
                opt.textContent = ch.name;
                chapterSelect.appendChild(opt);
            });
        }

        function loadAll() { loadResources(); loadQuizzes(); loadFlashcards(); }

        function copyChapterId() {
            const id = document.getElementById('currentChapterId').value;
            if (!id) return alert('Select a chapter first');
            navigator.clipboard.writeText(id).then(() => alert('Copied: ' + id));
        }

        // ================== RESOURCES ==================
        let editingResourceKey = null;
        function loadResources() {
            const id = document.getElementById('chapterSelect').value;
            if (!id) {
                document.getElementById('resourcesList').innerHTML = 'Select a chapter first.';
                document.getElementById('resCount').textContent = '';
                return;
            }
            db.ref('resources/' + id).on('value', snap => {
                let html = '';
                let count = 0;
                snap.forEach(child => {
                    const r = child.val();
                    const key = child.key;
                    count++;
                    html += `<div class="item">
                        <span>${r.title} (${r.type})</span>
                        <div>
                            <button class="btn-del" onclick="editResource('${id}','${key}','${r.title}','${r.url}','${r.type}')" style="background:#FF9800;">Edit</button>
                            <button class="btn-del" onclick="deleteResource('${id}','${key}')">Del</button>
                        </div>
                    </div>`;
                });
                document.getElementById('resourcesList').innerHTML = html;
                document.getElementById('resCount').textContent = `(${count} items)`;
            });
        }

        function editResource(chapterId, key, title, url, type) {
            document.getElementById('resTitle').value = title;
            document.getElementById('resUrl').value = url;
            document.getElementById('resType').value = type;
            editingResourceKey = key;
            document.getElementById('editingChapterKey').value = chapterId;
            document.querySelector('#resourcesSection .btn-save').textContent = 'Update Resource';
        }

        function addResource() {
            const chapterId = document.getElementById('editingChapterKey').value || document.getElementById('chapterSelect').value;
            const title = document.getElementById('resTitle').value.trim();
            const url = document.getElementById('resUrl').value.trim();
            const type = document.getElementById('resType').value;
            if (!title || !url) return alert('Fill all fields');
            if (editingResourceKey) {
                db.ref(`resources/${chapterId}/${editingResourceKey}`).update({ title, type, url });
                editingResourceKey = null;
                document.querySelector('#resourcesSection .btn-save').textContent = 'Add Resource';
            } else {
                db.ref('resources/' + chapterId).push({ title, type, url });
            }
            document.getElementById('resTitle').value = '';
            document.getElementById('resUrl').value = '';
            document.getElementById('editingChapterKey').value = '';
        }

        function deleteResource(chapterId, key) {
            if (confirm('Delete this resource?')) db.ref(`resources/${chapterId}/${key}`).remove();
        }

        function deleteAllResources() {
            const chapterId = document.getElementById('chapterSelect').value;
            if (!chapterId) return alert('Select a chapter');
            if (confirm('Delete ALL resources for this chapter?')) {
                db.ref('resources/' + chapterId).remove();
            }
                    }

        // ================== CHAPTER MANAGEMENT ==================
        const chapterRef = db.ref('chapters');

        function onChapterStreamChange() {
            const stream = document.getElementById('chapterStream').value;
            const classSelect = document.getElementById('chapterClass');
            classSelect.innerHTML = '<option value="">-- Class --</option>';
            if (stream === 'CBSE') {
                for (let c of [9,10,11,12]) classSelect.innerHTML += `<option value="${c}">${c}</option>`;
            } else {
                for (let c of [11,12]) classSelect.innerHTML += `<option value="${c}">${c}</option>`;
            }
            updateSubjectOptions();
        }

        function updateSubjectOptions() {
            const stream = document.getElementById('chapterStream').value;
            const cls = document.getElementById('chapterClass').value;
            const subjectInput = document.getElementById('chapterSubjectInput');
            // We'll just keep the input editable; no datalist needed.
            // But we can auto-fill based on stream/class
            let subjects = [];
            if (stream === 'CBSE') {
                if (cls == 9 || cls == 10) subjects = ['Science','Mathematics'];
                else subjects = ['Physics','Chemistry','Mathematics','Biology'];
            } else if (stream === 'JEE') {
                subjects = ['Physics','Chemistry','Mathematics'];
            } else if (stream === 'NEET') {
                subjects = ['Physics','Chemistry','Biology'];
            }
            // Optionally set placeholder
            subjectInput.placeholder = subjects.join(', ') + ' or type new';
        }

        document.getElementById('chapterClass').addEventListener('change', updateSubjectOptions);

        function loadChapters() {
            chapterRef.once('value', snap => {
                const list = document.getElementById('chapterList');
                list.innerHTML = '';
                const data = snap.val() || {};
                for (let key in data) {
                    const ch = data[key];
                    list.innerHTML += `<div class="item">
                        <span>${ch.stream} - ${ch.class} - ${ch.subject} - ${ch.name} (ID: ${key})</span>
                        <div>
                            <button class="btn-del" onclick="editChapter('${key}','${ch.name}','${ch.stream}','${ch.class}','${ch.subject}')">Edit</button>
                            <button class="btn-del" style="background:#D32F2F" onclick="deleteChapter('${key}')">Del</button>
                        </div>
                    </div>`;
                }
            });
        }

        function editChapter(key, name, stream, cls, subject) {
            document.getElementById('chapterName').value = name;
            document.getElementById('chapterStream').value = stream;
            onChapterStreamChange();
            setTimeout(() => {
                document.getElementById('chapterClass').value = cls;
                updateSubjectOptions();
                document.getElementById('chapterSubjectInput').value = subject;
            }, 200);
            document.getElementById('editingChapterKey2').value = key;
        }

        function saveChapter() {
            const name = document.getElementById('chapterName').value.trim();
            const stream = document.getElementById('chapterStream').value;
            const cls = document.getElementById('chapterClass').value;
            const subject = document.getElementById('chapterSubjectInput').value.trim();
            if (!name || !stream || !cls || !subject) return alert('Fill all fields');
            const key = document.getElementById('editingChapterKey2').value;
            if (key) {
                chapterRef.child(key).update({ name, stream, class: cls, subject });
            } else {
                chapterRef.push({ name, stream, class: cls, subject });
            }
            document.getElementById('editingChapterKey2').value = '';
            document.getElementById('chapterName').value = '';
            document.getElementById('chapterSubjectInput').value = '';
            loadChapters();
        }

        function deleteChapter(key) {
            if (confirm('Delete this chapter? Related resources/quizzes/flashcards will also be deleted.')) {
                chapterRef.child(key).remove();
                db.ref('resources/' + key).remove();
                db.ref('quizzes/' + key).remove();
                db.ref('flashcards/' + key).remove();
                loadChapters();
            }
        }

        loadChapters();
        onStreamChange();
    </script>
</body>
</html>
